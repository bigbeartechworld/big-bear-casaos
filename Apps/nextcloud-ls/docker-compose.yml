# Configuration for nextcloud-ls setup

# Name of the big-bear-nextcloud-ls application
name: big-bear-nextcloud-ls
# Service definitions for the big-bear-nextcloud-ls application
services:
  # Service name: big-bear-nextcloud-ls
  # The `big-bear-nextcloud-ls` service definition
  big-bear-nextcloud-ls:
    # Define the container name
    container_name: big-bear-nextcloud-ls
    # Use the nextcloud:28.0.1-apache image
    image: linuxserver/nextcloud:34.0.1@sha256:f31cb07f2728b4ea327e6f7e0a1baff50a7d1fae65466153380fa7bae99e9297
    # Restart the container unless stopped
    restart: unless-stopped
    # Map port 7580 on the host to port 80 on the container
    ports:
      - 10443:443
    # Mount the nextcloud-ls_data directory on the host to /var/www/html in the container
    volumes:
      - /DATA/AppData/$AppID/config:/config
      - /DATA/AppData/$AppID/data:/data
    # Set environment variables
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    x-casaos:
      envs:
        - container: PUID
          description:
            en_US: 'Container Variable: PUID'
        - container: PGID
          description:
            en_US: 'Container Variable: PGID'
        - container: TZ
          description:
            en_US: 'Container Variable: TZ'
      volumes:
        - container: /config
          description:
            en_US: 'Container Path: /config'
        - container: /data
          description:
            en_US: 'Container Path: /data'
      ports:
        - container: "443"
          description:
            en_US: 'Container Port: 443'
x-casaos:
  # Supported CPU architectures for this application
  architectures:
    - amd64
    - arm64
  # Stable reverse-domain app identifier
  id: com.bigbeartechworld.nextcloud-ls
  # Main service for this application
  main: big-bear-nextcloud-ls
  # Detailed description for the application
  description:
    en_US: Nextcloud puts your data at your fingertips, under your control. Store your documents, calendar, contacts and photos on a server at home, at one of our providers or in a data center you trust.
  # Screenshot links for the application
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@f2eaaebe9b6d487a2b594a716fc5bbcf8e80ac0d/Apps/Nextcloud/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@f2eaaebe9b6d487a2b594a716fc5bbcf8e80ac0d/Apps/Nextcloud/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@f2eaaebe9b6d487a2b594a716fc5bbcf8e80ac0d/Apps/Nextcloud/screenshot-3.png
  # Brief tagline for the application
  tagline:
    en_US: LinuxServer - The productivity platform that keeps you in control
  # Developer's information
  developer: nextcloud
  # Author of this particular configuration
  author: BigBearTechWorld
  # Icon URL for the application
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/nextcloud.png
  # Thumbnail image for the application (if any)
  thumbnail: https://cdn.jsdelivr.net/gh/nextcloud/screenshots@328f3616f78906ecb405bdcc00481bfbbeb59278/nextcloud-hub-25-files.png
  # Title for the application
  title:
    en_US: Nextcloud LS
  # Category under which the application falls
  category: Media
  # Default port mapping for the application
  port_map: "10443"
