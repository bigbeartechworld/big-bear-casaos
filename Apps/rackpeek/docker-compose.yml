# Configuration for rackpeek setup

# Name of the big-bear-rackpeek application
name: big-bear-rackpeek
# Service definitions for the big-bear-rackpeek application
services:
  # Service name: big-bear-rackpeek
  # The `big-bear-rackpeek` service definition
  big-bear-rackpeek:
    # Name of the container
    container_name: big-bear-rackpeek
    # Image to be used for the container
    image: aptacode/rackpeek:v1.4.0
    # Container restart policy
    restart: unless-stopped
    # Volumes to be mounted to the container
    volumes:
      - /DATA/AppData/$AppID/config:/app/config
    # Ports mapping between host and container
    ports:
      # Mapping port 8095 of the host to port 8080 of the container
      - "8095:8080"
    x-casaos:
      volumes:
        - container: /app/config
          description:
            en_us: 'Container Path: /app/config'
      ports:
        - container: "8080"
          description:
            en_us: 'Container Port: 8080'
x-casaos:
  # Supported CPU architectures for this application
  architectures:
    - amd64
    - arm64
  # Main service for this application
  main: big-bear-rackpeek
  # Detailed description for the application
  description:
    en_us: A webui and CLI tool to discover, manage, and document your home lab and small-scale IT infrastructure. Track hardware, services, networks, and their relationships using open, non-proprietary YAML.
  # Brief tagline for the application
  tagline:
    en_us: Document Your Home Lab
  # Developer's information
  developer: timmoth
  # Author of this particular configuration
  author: BigBearTechWorld
  # Icon URL for the application
  icon: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-universal-apps/apps/rackpeek/logo.jpg
  # Thumbnail image for the application (if any)
  thumbnail: ""
  # Title for the application
  title:
    en_us: RackPeek
  # Category under which the application falls
  category: BigBearCasaOS
  # Default port mapping for the application
  port_map: "8095"
