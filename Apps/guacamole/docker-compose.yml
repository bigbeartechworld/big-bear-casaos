# Name of the configuration: big-bear-guacamole
name: big-bear-guacamole
# Define the services required for the application
services:
  # guacd service configuration
  guacd:
    # Docker image to use for this service
    image: guacamole/guacd:1.6.0@sha256:8974eaa9ba32f713daf311e7cc8cd7e4cdfba1edea39eed75524e78ef4b08f4f
    # Restart policy for the container
    restart: always
  # app service configuration
  app:
    image: guacamole/guacamole:1.6.0@sha256:f344085e618bb05e22b964b0208dbd06d3468275bac70206f93805245e067b40
    restart: always
    # Link this service to the guacd service
    links:
      - guacd
    # Environment variables for the app service
    environment:
      - GUACD_HOSTNAME=guacd
      - MYSQL_HOSTNAME=mysql
      - MYSQL_DATABASE=guacamole_db
      - MYSQL_USER=guacamole_user
      - MYSQL_PASSWORD=some_password
    # Map port 8090 on the host to port 8080 on the container
    ports:
      - 8090:8080
    x-casaos:
      envs:
        - container: GUACD_HOSTNAME
          description:
            en_US: 'Container Variable: GUACD_HOSTNAME'
        - container: MYSQL_HOSTNAME
          description:
            en_US: 'Container Variable: MYSQL_HOSTNAME'
        - container: MYSQL_DATABASE
          description:
            en_US: 'Container Variable: MYSQL_DATABASE'
        - container: MYSQL_USER
          description:
            en_US: 'Container Variable: MYSQL_USER'
        - container: MYSQL_PASSWORD
          description:
            en_US: 'Container Variable: MYSQL_PASSWORD'
      ports:
        - container: "8080"
          description:
            en_US: 'Container Port: 8080'
  # mysql service configuration
  mysql:
    image: mysql:5.7@sha256:4bc6bc963e6d8443453676cae56536f4b8156d78bae03c0145cbe47c2aad73bb
    restart: always
    # Environment variables for the MySQL service
    environment:
      - MYSQL_ROOT_PASSWORD=my-secret-pw
      - MYSQL_DATABASE=guacamole_db
      - MYSQL_USER=guacamole_user
      - MYSQL_PASSWORD=some_password
    # Volume mapping for persistent storage
    volumes:
      - /DATA/AppData/$AppID/mysql:/var/lib/mysql
    x-casaos:
      envs:
        - container: MYSQL_ROOT_PASSWORD
          description:
            en_US: 'Container Variable: MYSQL_ROOT_PASSWORD'
        - container: MYSQL_DATABASE
          description:
            en_US: 'Container Variable: MYSQL_DATABASE'
        - container: MYSQL_USER
          description:
            en_US: 'Container Variable: MYSQL_USER'
        - container: MYSQL_PASSWORD
          description:
            en_US: 'Container Variable: MYSQL_PASSWORD'
      volumes:
        - container: /var/lib/mysql
          description:
            en_US: 'Container Path: /var/lib/mysql'
x-casaos:
  # Supported CPU architectures for this application
  architectures:
    - amd64
  # Stable reverse-domain app identifier
  id: com.bigbeartechworld.guacamole
  # Main service for this application
  main: app
  # Detailed description for the application
  description:
    en_US: Apache Guacamole is a free and open-source, cross-platform, clientless remote desktop gateway maintained by the Apache Software Foundation.
  # Brief tagline for the application
  tagline:
    en_US: Guacamole
  # Developer's information
  developer: guacamole
  # Author of this particular configuration
  author: BigBearTechWorld
  # Icon URL for the application
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/guacamole.png
  # Thumbnail image for the application (if any)
  thumbnail: ""
  # Title for the application
  title:
    en_US: Guacamole
  # Category under which the application falls
  category: Others
  # Default port mapping for the application
  port_map: "8090"
