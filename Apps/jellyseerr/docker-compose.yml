name: big-bear-jellyseerr # Name of the compose project
services:
  app:
    image: fallenbagel/jellyseerr:2.7.3 # Image to use for the jellyseerr service
    ports:
      - "5055:5055" # Maps port 5055 on the host to port 5055 on the container
    volumes:
      - /DATA/AppData/$AppID/config:/app/config # Binds a volume from host to container for configuration
    environment:
      - LOG_LEVEL=debug # Sets the log level to debug
      - TZ=$TZ # Sets the timezone, using host's timezone variable
    restart: unless-stopped # Service will restart unless it is explicitly stopped
    network_mode: bridge # Uses bridge network mode
    x-casaos:
      envs:
        - container: LOG_LEVEL
          description:
            en_US: 'Container Variable: LOG_LEVEL'
        - container: TZ
          description:
            en_US: 'Container Variable: TZ'
      volumes:
        - container: /app/config
          description:
            en_US: 'Container Path: /app/config'
      ports:
        - container: "5055"
          description:
            en_US: 'Container Port: 5055'
x-casaos:
  # Supported CPU architectures for this application
  architectures:
    - amd64
    - arm64
  # Stable reverse-domain app identifier
  id: com.bigbeartechworld.jellyseerr
  # Main service for this application
  main: app
  # Detailed description for the application
  description:
    en_US: 'Jellyseerr is a free and open source software application for managing requests for your media library. It is a fork of Overseerr built to bring support for Jellyfin & Emby media servers! Note: Jellyseerr is no longer actively maintained. New users should use Seerr instead.'
  # Brief tagline for the application
  tagline:
    en_US: Legacy media request manager - new users should use Seerr instead
  # Developer's information
  developer: Fallenbagel
  # Author of this particular configuration
  author: BigBearCommunity
  # Icon URL for the application
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/jellyseerr.png
  # Thumbnail image for the application (if any)
  thumbnail: https://cdn.jsdelivr.net/gh/seerr-team/seerr@develop/public/preview.jpg
  # Installation tips
  tips:
    before_install:
      en_US: Jellyseerr is no longer actively maintained. Consider installing Seerr instead, which is the official successor with automatic migration support.
  # Title for the application
  title:
    en_US: Jellyseerr (Legacy)
  # Category under which the application falls
  category: Media
  # Default port mapping for the application
  port_map: "5055"
