# Docker Compose configuration for SnapOtter.
# SnapOtter starts embedded Postgres and Redis when DATABASE_URL and REDIS_URL are unset.
name: big-bear-snapotter
services:
  snapotter:
    container_name: snapotter
    image: snapotter/snapotter:2.0.0
    restart: unless-stopped
    ports:
      - "1349:1349"
    environment:
      - AUTH_ENABLED=true
      - DEFAULT_USERNAME=admin
      - DEFAULT_PASSWORD=admin
      - MAX_UPLOAD_SIZE_MB=0
      - MAX_BATCH_SIZE=0
      - CONCURRENT_JOBS=0
      - REDIS_MAXMEMORY=512mb
      - TRUST_PROXY=true
    volumes:
      - /DATA/AppData/$AppID/data:/data
      - /DATA/AppData/$AppID/workspace:/tmp/workspace
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:1349/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    x-casaos:
      envs:
        - container: AUTH_ENABLED
          description:
            en_us: 'Container Variable: AUTH_ENABLED'
        - container: DEFAULT_USERNAME
          description:
            en_us: 'Container Variable: DEFAULT_USERNAME'
        - container: DEFAULT_PASSWORD
          description:
            en_us: 'Container Variable: DEFAULT_PASSWORD'
        - container: MAX_UPLOAD_SIZE_MB
          description:
            en_us: 'Container Variable: MAX_UPLOAD_SIZE_MB'
        - container: MAX_BATCH_SIZE
          description:
            en_us: 'Container Variable: MAX_BATCH_SIZE'
        - container: CONCURRENT_JOBS
          description:
            en_us: 'Container Variable: CONCURRENT_JOBS'
        - container: REDIS_MAXMEMORY
          description:
            en_us: 'Container Variable: REDIS_MAXMEMORY'
        - container: TRUST_PROXY
          description:
            en_us: 'Container Variable: TRUST_PROXY'
      volumes:
        - container: /data
          description:
            en_us: 'Container Path: /data'
        - container: /tmp/workspace
          description:
            en_us: 'Container Path: /tmp/workspace'
      ports:
        - container: "1349"
          description:
            en_us: 'Container Port: 1349'
x-casaos:
  # Supported CPU architectures for this application
  architectures:
    - amd64
    - arm64
  # Main service for this application
  main: snapotter
  # Detailed description for the application
  description:
    en_us: SnapOtter is an open-source, self-hosted file manipulation suite with 200+ tools across images, video, audio, PDFs, and files. It includes batch processing, reusable pipelines, local AI tools, a browser image editor, and a REST API so files stay on your own server.
  # Screenshot links for the application
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-universal-apps@main/apps/snapotter/screenshots/screenshot-1.png
  # Brief tagline for the application
  tagline:
    en_us: Self-hosted file toolkit for images, video, audio, PDFs, and files.
  # Developer's information
  developer: SnapOtter
  # Author of this particular configuration
  author: SnapOtter
  # Icon URL for the application
  icon: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-universal-apps@main/apps/snapotter/logo.png
  # Thumbnail image for the application (if any)
  thumbnail: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-universal-apps@main/apps/snapotter/thumbnail.png
  # Installation tips
  tips:
    before_install:
      en_us: |
        Default login is admin / admin. You will be asked to change the password after first login. This package uses SnapOtter embedded mode, so leave DATABASE_URL and REDIS_URL unset unless you are moving to an external Postgres/Redis stack.
  # Title for the application
  title:
    en_us: SnapOtter
  # Category under which the application falls
  category: BigBearCasaOS
  # Default port mapping for the application
  port_map: "1349"
