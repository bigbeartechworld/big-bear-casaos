name: big-bear-scrypted
services:
  scrypted:
    container_name: scrypted
    image: koush/scrypted:v0.144.1-noble-full@sha256:25440767192b0d4a0709f50388d14cdf365ba6bff59d04e40a41ca2b7b9a6b70
    network_mode: host
    environment:
    - SCRYPTED_WEBHOOK_UPDATE_AUTHORIZATION=Bearer SET_THIS_TO_SOME_RANDOM_TEXT
    - SCRYPTED_WEBHOOK_UPDATE=http://localhost:10444/v1/update
    volumes:
    - /DATA/AppData/$AppID/data:/server/volume
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '10'
    labels:
    - com.centurylinklabs.watchtower.scope=scrypted
  watchtower:
    environment:
    - WATCHTOWER_HTTP_API_TOKEN=SET_THIS_TO_SOME_RANDOM_TEXT
    - WATCHTOWER_HTTP_API_UPDATE=true
    - WATCHTOWER_SCOPE=scrypted
    - WATCHTOWER_HTTP_API_PERIODIC_POLLS=true
    image: containrrr/watchtower@sha256:6dd50763bbd632a83cb154d5451700530d1e44200b268a4e9488fefdfcf2b038
    container_name: watchtower
    restart: unless-stopped
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    labels:
    - com.centurylinklabs.watchtower.scope=scrypted
    ports:
    - 10444:8080
    command: --interval 3600 --cleanup --scope scrypted
x-casaos:
  id: com.bigbeartechworld.scrypted
  main: scrypted
  icon: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-casaos@gh-pages/apps/com.bigbeartechworld.scrypted/assets/icon.png
  title:
    en_US: Scrypted
  port_map: '10443'
