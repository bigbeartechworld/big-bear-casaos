name: big-bear-snapotter
services:
  snapotter:
    container_name: snapotter
    image: snapotter/snapotter:2.1.0@sha256:d2cfc667e6b51b098c484eda39c14a6fd205409769f6e55800b59853791734d1
    restart: unless-stopped
    ports:
    - 1349:1349
    environment:
    - AUTH_ENABLED=true
    - DEFAULT_USERNAME=admin
    - DEFAULT_PASSWORD=admin
    - MAX_UPLOAD_SIZE_MB=0
    - MAX_BATCH_SIZE=0
    - CONCURRENT_JOBS=0
    - REDIS_MAXMEMORY=512mb
    - TRUST_PROXY=true
    volumes:
    - /DATA/AppData/$AppID/data:/data
    - /DATA/AppData/$AppID/workspace:/tmp/workspace
    healthcheck:
      test:
      - CMD
      - curl
      - -fsS
      - http://localhost:1349/api/v1/health
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
x-casaos:
  id: com.bigbeartechworld.snapotter
  main: snapotter
  icon: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-casaos@gh-pages/apps/com.bigbeartechworld.snapotter/assets/icon.png
  title:
    en_US: SnapOtter
  port_map: '1349'
