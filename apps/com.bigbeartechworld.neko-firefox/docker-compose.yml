name: big-bear-neko-firefox
services:
  big-bear-neko-firefox:
    container_name: neko-firefox
    image: m1k1o/neko:firefox@sha256:95965f64caf1cc8a4abab2f168833ea492af285a504e990d377e3b9d1878af8e
    restart: unless-stopped
    shm_size: 2gb
    ports:
    - 8080:8080
    - 52000:52000/udp
    - 52001:52001/udp
    - 52002:52002/udp
    - 52003:52003/udp
    - 52004:52004/udp
    - 52005:52005/udp
    - 52006:52006/udp
    - 52007:52007/udp
    - 52008:52008/udp
    - 52009:52009/udp
    - 52010:52010/udp
    environment:
      NEKO_SCREEN: 1920x1080@30
      NEKO_PASSWORD: neko
      NEKO_PASSWORD_ADMIN: bigbear
      NEKO_EPR: 52000-52010
      NEKO_ICELITE: '1'
      NEKO_DEBUG: '1'
      NEKO_NAT1TO1: '[CASAOS_IP]'
x-casaos:
  id: com.bigbeartechworld.neko-firefox
  main: big-bear-neko-firefox
  icon: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-casaos@gh-pages/apps/com.bigbeartechworld.neko-firefox/assets/icon.png
  title:
    en_US: Neko Firefox
  port_map: '8080'
