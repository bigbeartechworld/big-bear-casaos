name: big-bear-gitea-mirror
services:
  big-bear-gitea-mirror:
    container_name: big-bear-gitea-mirror
    image: ghcr.io/raylabshq/gitea-mirror:v3.15.10@sha256:2d97c98fd6f32915bbcc247373b9b39606d337cb3fb576980673d842dcaea291
    restart: unless-stopped
    ports:
    - 4321:4321
    volumes:
    - /DATA/AppData/$AppID/data:/app/data
    environment:
    - NODE_ENV=production
    - DATABASE_URL=file:data/gitea-mirror.db
    - HOST=0.0.0.0
    - PORT=4321
    - BETTER_AUTH_URL=http://0.0.0.0:4321
    - BETTER_AUTH_SECRET=your-secret-key-change-this-in-production
    healthcheck:
      test:
      - CMD
      - wget
      - --no-verbose
      - --tries=3
      - --spider
      - http://localhost:4321/api/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
x-casaos:
  id: com.bigbeartechworld.gitea-mirror
  main: big-bear-gitea-mirror
  icon: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-casaos@gh-pages/apps/com.bigbeartechworld.gitea-mirror/assets/icon.png
  title:
    en_US: Gitea Mirror
  port_map: '4321'
