name: big-bear-reactive-resume
services:
  app:
    container_name: big-bear-reactive-resume
    image: amruthpillai/reactive-resume:v5.2.3@sha256:bfacee69faad04a8b785854d02cb078fb223824e8b07a07ff21fa39ebfa9fe8c
    restart: unless-stopped
    ports:
    - 3000:3000
    depends_on:
    - postgres
    - minio
    - redis
    - chrome
    networks:
    - reactive-resume-network
    environment:
      PORT: '3000'
      NODE_ENV: production
      PUBLIC_URL: http://[CASAOS_IP]:3000
      STORAGE_URL: http://[CASAOS_IP]:9000/default
      CHROME_TOKEN: chrome_token
      CHROME_URL: ws://chrome:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      ACCESS_TOKEN_SECRET: access_token_secret
      REFRESH_TOKEN_SECRET: refresh_token_secret
      MAIL_FROM: noreply@localhost
      STORAGE_ENDPOINT: '[CASAOS_IP]'
      STORAGE_PORT: '9000'
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: default
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_USE_SSL: 'false'
      REDIS_URL: redis://default:password@redis:6379
  postgres:
    container_name: big-bear-reactive-resume-db
    image: postgres:15-alpine@sha256:3d0f7584ed7d04e27fa050d6683a74746608faf21f202be78460d679cc56461f
    restart: unless-stopped
    volumes:
    - /DATA/AppData/$AppID/pg/data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres -d postgres
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - reactive-resume-network
  minio:
    container_name: big-bear-reactive-resume-minio
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z-cpuv1@sha256:a34ac7cbc53154bef4804b1f9d83a555f944d8c26e6466cef7e782fdb5ec40c4
    command:
    - server
    - /data
    restart: unless-stopped
    ports:
    - 9000:9000
    volumes:
    - /DATA/AppData/$AppID/minio/data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
    - reactive-resume-network
  chrome:
    container_name: big-bear-reactive-resume-chrome
    image: browserless/chrome:1.61.1-puppeteer-21.4.1@sha256:b6acad3ef2e1e0e3c2eb018add533570db2b34f5304682bad58c803b23ef7bd2
    restart: unless-stopped
    environment:
      TOKEN: chrome_token
      EXIT_ON_HEALTH_FAILURE: 'true'
      PRE_REQUEST_HEALTH_CHECK: 'true'
    networks:
    - reactive-resume-network
  redis:
    container_name: big-bear-reactive-resume-redis
    image: redis:8.2.2-alpine@sha256:1c78f5e7512cc8b22b0edc95c20e7abd9e1fd832e5dfd5c3c6b59ce82fb238d0
    restart: unless-stopped
    command:
    - redis-server
    - --requirepass
    - password
    networks:
    - reactive-resume-network
networks:
  reactive-resume-network:
    driver: bridge
x-casaos:
  id: com.bigbeartechworld.reactive-resume
  main: app
  icon: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-casaos@gh-pages/apps/com.bigbeartechworld.reactive-resume/assets/icon.png
  title:
    en_US: Reactive Resume
  port_map: '3000'
