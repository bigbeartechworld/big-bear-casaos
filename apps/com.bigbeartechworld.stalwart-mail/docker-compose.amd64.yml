name: big-bear-stalwart-mail
services:
  big-bear-stalwart-mail:
    container_name: big-bear-stalwart-mail
    image: stalwartlabs/stalwart:v0.16.13@sha256:254320d6d9af6bafce85fcf301aaa29fa0a4a07e2b91e19fe97588ecfb230fab
    restart: unless-stopped
    volumes:
    - /DATA/AppData/$AppID/data:/opt/stalwart
