name: big-bear-matterbridge
services:
  big-bear-matterbridge:
    container_name: big-bear-matterbridge
    image: luligu/matterbridge:3.10.0@sha256:bac89da9cab31c5a4e25f5ab67721ae0fdfcd1e3a51e5a607c8106a55804d54e
    restart: unless-stopped
    network_mode: host
    volumes:
    - /DATA/AppData/$AppID/Matterbridge:/root/Matterbridge
    - /DATA/AppData/$AppID/.matterbridge:/root/.matterbridge
x-casaos:
  id: com.bigbeartechworld.matterbridge
  main: big-bear-matterbridge
  icon: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-casaos@gh-pages/apps/com.bigbeartechworld.matterbridge/assets/icon.png
  title:
    en_US: Matterbridge
  port_map: '8283'
