name: big-bear-ntfy
services:
  app:
    image: binwiederhier/ntfy:v2.26.0@sha256:a6d335064ae927c4dbef118e1fa39656b3d2e01472b2a82af5915d5cebfe815f
    command:
    - serve
    environment:
    - TZ=UTC
    ports:
    - target: 80
      published: '7200'
      protocol: tcp
    restart: unless-stopped
    volumes:
    - /DATA/AppData/$AppID/cache:/var/cache/ntfy
    - /DATA/AppData/$AppID/config:/etc/ntfy
x-casaos:
  id: com.bigbeartechworld.ntfysh
  main: app
  icon: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-casaos@gh-pages/apps/com.bigbeartechworld.ntfysh/assets/icon.png
  title:
    en_US: Ntfy.sh
  port_map: '7200'
