name: big-bear-invoice-ninja
services:
  big-bear-invoice-ninja:
    image: invoiceninja/invoiceninja:5.13.26@sha256:d1eec88a8134481b19a0d78107abc6a72bf29987e310cc82f3b81dfcb02decf1
    container_name: big-bear-invoice-ninja
    restart: unless-stopped
    user: 1500:1500
    environment:
    - IN_USER_EMAIL=admin@bigbeartechworld.com
    - IN_PASSWORD=ad178c4b-302f-44e6-937f-8c7808f23795
    - APP_URL=http://big-bear-invoice-ninja-web
    - APP_KEY=base64:4doW1cidLuSqm7Z/BhPu/bn5HGnCKyEcSSlbVPTYYRU=
    - APP_CIPHER=AES-256-CBC
    - DB_HOST=big-bear-invoice-ninja-db
    - DB_PORT=3306
    - DB_DATABASE=ninja
    - DB_USERNAME=ninja
    - DB_PASSWORD=ninja
    - REQUIRE_HTTPS=false
    - QUEUE_CONNECTION=database
    - IS_DOCKER=TRUE
    volumes:
    - /DATA/AppData/$AppID/data/public:/var/www/app/public
    - /DATA/AppData/$AppID/data/storage:/var/www/app/storage
    - /DATA/AppData/$AppID/data/php/php.ini:/usr/local/etc/php/php.ini
    - /DATA/AppData/$AppID/data/php/php-cli.ini:/usr/local/etc/php/php-cli.ini
    depends_on:
    - big-bear-invoice-ninja-db
    networks:
    - big-bear-invoice-ninja-network
  big-bear-invoice-ninja-web:
    container_name: big-bear-invoice-ninja-web
    image: nginx:1.29@sha256:1881968aff6f7cdcc4b888c00a11f4ce241ad7ec957e0cb4a9e19e93a3ff87ea
    restart: unless-stopped
    volumes:
    - /DATA/AppData/$AppID/data/nginx/invoice-ninja.conf:/etc/nginx/conf.d/default.conf
    - /DATA/AppData/$AppID/data/public:/var/www/app/public
    ports:
    - 8080:80
    networks:
    - big-bear-invoice-ninja-network
  big-bear-invoice-ninja-db:
    image: mariadb:10.4@sha256:22edfe1c78349f8cae88bbb5c2873b7e6c515be767c91c691308ce57445806f3
    container_name: big-bear-invoice-ninja-db
    restart: unless-stopped
    environment:
    - MARIADB_ROOT_PASSWORD=ad178c4b-302f-44e6-937f-8c7808f23795
    - MARIADB_USER=ninja
    - MARIADB_PASSWORD=ninja
    - MARIADB_DATABASE=ninja
    volumes:
    - /DATA/AppData/$AppID/data/mysql:/var/lib/mysql
    networks:
    - big-bear-invoice-ninja-network
    depends_on:
    - big-bear-invoice-ninja-init
    command:
    - mysqld
    - --character-set-server=utf8mb4
    - --collation-server=utf8mb4_unicode_ci
    - --wait_timeout=28800
    - --log-warnings=0
  big-bear-invoice-ninja-init:
    image: bash:5.3.15@sha256:a19c811ee9e97fa8a080001d82b8e0ded303f0795cffdb1cbd162731bc8ce208
    container_name: big-bear-invoice-ninja-init
    volumes:
    - /DATA/AppData/$AppID/data:/tmp/data
    command:
    - /bin/sh
    - -c
    - 'if [ ! -f /tmp/data/.init_complete ]; then echo ''Starting initialization process...''
      && if [ -f /tmp/data/init/init.sh ]; then echo ''Found init.sh, making it executable...''
      && chmod +x /tmp/data/init/init.sh && echo ''Executing init.sh...'' && /tmp/data/init/init.sh
      && echo ''init.sh execution completed.'' && touch /tmp/data/.init_complete &&
      echo ''Initialization process finished.''; else echo ''Error: /tmp/data/init/init.sh
      not found!'' && exit 1; fi; else echo ''Initialization already completed. Exiting.'';
      fi && exit 0'
    networks:
    - big-bear-invoice-ninja-network
    restart: 'no'
    logging:
      driver: json-file
      options:
        max-size: 200k
        max-file: '10'
networks:
  big-bear-invoice-ninja-network:
    driver: bridge
x-casaos:
  id: com.bigbeartechworld.invoice-ninja
  main: big-bear-invoice-ninja-web
  icon: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-casaos@gh-pages/apps/com.bigbeartechworld.invoice-ninja/assets/icon.png
  title:
    en_US: Invoice Ninja
  port_map: '8080'
