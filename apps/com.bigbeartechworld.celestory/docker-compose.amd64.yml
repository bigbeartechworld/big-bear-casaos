name: big-bear-celestory-voltask
services:
  gateway:
    image: celestory/gateway:1.1.2@sha256:d37ccfefd431abde1cec62b1c93d00d5579f57f194e65b5d488057206201154e
    container_name: celestory-gateway
    ports:
    - 1500:80
    environment:
      SERVER_NAME: localhost
      FRONTEND_HOST: frontend
      FRONTEND_PORT: 80
      VOLTASK_HOST: voltask
      VOLTASK_PORT: 1401
      HUB_HOST: hub
      HUB_PORT: 1402
    depends_on:
      frontend:
        condition: service_healthy
      voltask:
        condition: service_healthy
      hub:
        condition: service_healthy
      api:
        condition: service_healthy
      auth:
        condition: service_healthy
      generator:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:80/
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  frontend:
    image: celestory/frontend:1.1.4@sha256:e17dc1682c172578923368ceee14f0cc5774e67eb75f99fe9e2c39644bf2dc7b
    container_name: celestory-frontend
    environment:
      CLOUD_API_URL: http://api
      ACCOUNT_API_URL: http://auth
      AUTH_CLIENT_ID: self_hosted_client
      AUTH_CLIENT_SECRET: self_hosted_secret
      AUTH_AUDIENCE: self_hosted
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:80/
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  hub:
    image: celestory/hub:1.1.0@sha256:0a297ce4d96474096b81488de6ad4a566eba9144db26d491a31dab24d8f90678
    container_name: celestory-hub
    environment:
      AUTH_ORIGIN: http://auth
      AUTH_AUDIENCE: self_hosted
      AUTH_AUTHORITY_SECRET: ${AUTH_AUTHORITY_SECRET}
      AUTH_JWKS_URI: http://auth/.well-known/jwks.json
      DB_VOLTASK_URL: postgres://celestory_admin:celestory_postgres_password_@db/voltask
      DB_HUB_URL: postgres://celestory_admin:celestory_postgres_password_@db/hub
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PORT: 1402
      ORIGIN: ${HUB_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - require('http').get('http://127.0.0.1:1402/')
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  api:
    image: celestory/api:1.1.3@sha256:a2a63d3c86b8b1b4922a31b111783f79b661dea403978dfc5e99dabca45adb2b
    container_name: celestory-api
    volumes:
    - /DATA/AppData/$AppID/projectFiles:/app/projectFiles
    environment:
      PORT: 80
      SELF_HOSTED: 'true'
      STORAGE_SOLUTION: filesystem
      AUTH_DOMAIN: http://auth
      DB_URL: postgres://celestory_admin:celestory_postgres_password_@db/celestory
      AUTH_JWKS_URI: http://auth/.well-known/jwks.json
      AUTH_CLIENT_ID: self_hosted_client
      AUTH_CLIENT_SECRET: self_hosted_secret
      AUTH_AUDIENCE: self_hosted
      GENERATOR_URL: http://generator
      ORIGIN: ${API_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
      hub:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - require('http').get('http://127.0.0.1:80/')
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  generator:
    image: celestory/generator:1.1.2@sha256:1c3f34312b73f0eec5ad6aabe8a7592e989137852d0e2b8b5e13fa02d95e290e
    container_name: celestory-generator
    volumes:
    - /DATA/AppData/$AppID/projectFiles:/usr/src/app/projectFiles
    environment:
      PORT: 80
      PROJECT_FILES_PATH: /usr/src/app/projectFiles
      STORAGE_SOLUTION: filesystem
      PROJECT_FILES_PREFIX: /celestory/api/filesystem/
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - require('http').get('http://127.0.0.1:80/')
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  auth:
    image: celestory/auth:1.1.1@sha256:24e59ca0f1ae080dc5a176b534d0d5d67200baeb2a9f2babdece6d05203a2b86
    container_name: celestory-auth
    environment:
      PORT: 80
      DB_HOST: db
      DB_DATABASE: auth
      DB_USERNAME: celestory_admin
      DB_PASSWORD: celestory_postgres_password_
      API_AUTHORITY_SECRET: ${AUTH_AUTHORITY_SECRET}
      API_OAUTH_ISSUER: celestory_auth
      SELF_HOSTED_REDIRECT_URI: ${AUTH_REDIRECT_URI}
      GENERATE_KEYS: true
      API_ACCESS_TOKEN_TTL: 604800
      API_REFRESH_TOKEN_TTL: 1209600
      USE_SELF_HOSTED_CLIENT: true
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - require('http').get('http://127.0.0.1:80/')
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  voltask:
    image: celestory/voltask:1.0.8@sha256:0a015c6e24e0c933718629534bb9e18a7de3466698dcc954e924d92e88df540c
    container_name: celestory-voltask
    environment:
      PORT: 1401
      DATABASE_URL: postgresql://celestory_admin:celestory_postgres_password_@db:5432/voltask?schema=voltask
      ORCHESTRATOR_URL: http://orchestrator:3003
      VOLTASK_URL: http://voltask:1401
      WEBHOOK_URL: ${VOLTASK_WEBHOOK_URL}
      CELESTORY_AUTH_URL: http://auth
      CELESTORY_AUTH_CLIENT_ID: self_hosted_client
      CELESTORY_AUTH_CLIENT_SECRET: self_hosted_secret
      LICENSE_API_URL: http://hub:1402/hub
      PLUGINS_BUN_URL: http://plugins-bun:8001
      PLUGINS_DENO_URL: http://plugins-deno:8002
      PREMISE: on-premise
      PREMISE_USER_EMAIL: ${VOLTASK_ADMIN_EMAIL}
      PREMISE_USER_PASSWORD: ${VOLTASK_ADMIN_PASSWORD}
      STORAGE_DIR: /app/uploads
    volumes:
    - /DATA/AppData/$AppID/uploads:/app/uploads
    depends_on:
      hub:
        condition: service_healthy
      plugins-bun:
        condition: service_healthy
      plugins-deno:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - require('http').get('http://127.0.0.1:1401/voltask')
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  plugins-bun:
    image: celestory/voltask-plugins-bun:1.0.8@sha256:5ecedad2b68f2eccef55919bbce23e7ffad748f59089154fa74760e65b1a402a
    container_name: celestory-plugins-bun
    restart: unless-stopped
    environment:
      PORT: 8001
    logging:
      driver: json-file
      options:
        max-size: 30m
        max-file: '1'
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8001/imap
      retries: 3
      timeout: 60s
      interval: 10s
      start_period: 10s
      start_interval: 10s
  plugins-deno:
    image: celestory/voltask-plugins-deno:1.0.8@sha256:d34a4bae31f15e1c3ac3d002527e35103840d343e1f5e02b0534e21a07a65ea5
    container_name: celestory-plugins-deno
    restart: unless-stopped
    environment:
      PORT: 8002
    logging:
      driver: json-file
      options:
        max-size: 30m
        max-file: '1'
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8002/deno
      retries: 3
      timeout: 60s
      interval: 10s
      start_period: 10s
      start_interval: 10s
  orchestrator:
    image: celestory/voltask-orchestrator:1.0.8@sha256:558365b5b657cb718ceb7aef62182086503a8581cb342f46e6e791cb0d5d4c69
    container_name: celestory-orchestrator
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://celestory_admin:celestory_postgres_password_@db:5432/orchestrator?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3003/statements
      retries: 3
      timeout: 60s
      interval: 10s
      start_period: 10s
      start_interval: 10s
    restart: unless-stopped
  db:
    image: celestory/postgres:1.0.0@sha256:5ceb259468b3a38a73f8cc2d038a78a02f244aa5d81338dd66e77ddd532c49a8
    container_name: celestory-db
    environment:
      POSTGRES_USER: celestory_admin
      POSTGRES_PASSWORD: celestory_postgres_password_
    volumes:
    - /DATA/AppData/$AppID/db:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U celestory_admin
      interval: 10s
      timeout: 60s
      retries: 3
    restart: unless-stopped
x-casaos:
  id: com.bigbeartechworld.celestory
  main: gateway
  icon: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-casaos@gh-pages/apps/com.bigbeartechworld.celestory/assets/icon.png
  title:
    en_US: Celestory & Voltask
  port_map: '1500'
