name: big-bear-ls-adguard-home-sync
services:
  big-bear-ls-adguard-home-sync:
    container_name: big-bear-ls-adguard-home-sync
    image: linuxserver/adguardhome-sync:0.9.2@sha256:ec449e5ec8220d59c2fa0f8781ced69ae7f0373894db6c373cbc2ff713ca3523
    restart: unless-stopped
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=Etc/UTC
    - LOG_LEVEL=info
    - ORIGIN_URL=https://192.168.1.2:3000
    - ORIGIN_USERNAME=bigbear
    - ORIGIN_PASSWORD=casaos
    - REPLICA_URL=https://192.168.1.3:3000
    - REPLICA_USERNAME=bigbear
    - REPLICA_PASSWORD=casaos
    - CRON="0 */2 * * *"
    - RUN_ON_START=true
    - API_PORT=8080
    volumes:
    - /DATA/AppData/$AppID/config:/config
    ports:
    - 8080:8080
x-casaos:
  id: com.bigbeartechworld.ls-adguardhome-sync
  main: big-bear-ls-adguard-home-sync
  icon: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-casaos@gh-pages/apps/com.bigbeartechworld.ls-adguardhome-sync/assets/icon.png
  title:
    en_US: LS Adguard Home Sync
  port_map: '8080'
