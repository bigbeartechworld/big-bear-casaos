name: big-bear-nocodb
services:
  big-bear-nocodb:
    image: nocodb/nocodb:0.301.5@sha256:d9516f0bf546fd6c78a382ab0657626c683fca7aaafdbbe53c66baf15df7fc0d
    container_name: big-bear-nocodb
    restart: unless-stopped
    environment:
    - DATABASE_URL=postgres://nocodb:nocodb@big-bear-nocodb-db:5432/nocodb
    - NC_AUTH_JWT_SECRET=899499fc-36a0-4131-b077-7bb9f051ac9b
    - NC_REDIS_URL=redis://default:casaos@big-bear-nocodb-redis:6379
    ports:
    - 8080:8080
    volumes:
    - /DATA/AppData/$AppID/data:/usr/src/app/data
    networks:
    - big-bear-nocodb-network
  big-bear-nocodb-db:
    container_name: big-bear-nocodb-db
    image: postgres:13@sha256:4689940c683801b4ab839ab3b0a0a3555a5fe425371422310944e89eca7d8068
    restart: always
    environment:
      POSTGRES_DB: nocodb
      POSTGRES_USER: nocodb
      POSTGRES_PASSWORD: nocodb
    volumes:
    - /DATA/AppData/$AppID/pgdata:/var/lib/postgresql/data
    networks:
    - big-bear-nocodb-network
  big-bear-nocodb-redis:
    image: redis:8.2.2-alpine@sha256:1c78f5e7512cc8b22b0edc95c20e7abd9e1fd832e5dfd5c3c6b59ce82fb238d0
    container_name: big-bear-nocodb-redis
    restart: unless-stopped
    command:
    - redis-server
    - --requirepass
    - casaos
    volumes:
    - /DATA/AppData/$AppID/redis:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 1s
      timeout: 3s
      retries: 30
    networks:
    - big-bear-nocodb-network
networks:
  big-bear-nocodb-network:
    driver: bridge
x-casaos:
  id: com.bigbeartechworld.nocodb
  main: big-bear-nocodb
  icon: https://cdn.jsdelivr.net/gh/bigbeartechworld/big-bear-casaos@gh-pages/apps/com.bigbeartechworld.nocodb/assets/icon.png
  title:
    en_US: NocoDB
  port_map: '8080'
