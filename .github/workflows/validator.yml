name: Validate AppStore v2
on:
  pull_request:
    branches: [master]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq
      - name: Lint v2 invariants
        run: bash .github/scripts/lint-casaos-v2.sh
      - name: Detect v2 migration
        id: migrated
        run: bash .github/scripts/detect-v2-migration.sh
      - name: Build check (no publish)
        if: steps.migrated.outputs.migrated == 'true'
        uses: IceWhaleTech/build-appstore-action@v1
        with:
          source: .
          output: dist
          base-url: https://cdn.jsdelivr.net/gh/${{ github.repository }}@gh-pages
          report-json: out/build-v2-report.json
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-v2-report
          path: out/build-v2-report.json
          if-no-files-found: ignore
