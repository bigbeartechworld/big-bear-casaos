name: Release AppStore v2
on:
  push:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build v2 + v1 store
        id: build
        uses: IceWhaleTech/build-appstore-action@v1
        with:
          source: .
          output: dist
          base-url: https://cdn.jsdelivr.net/gh/${{ github.repository }}@gh-pages
          report-json: out/build-v2-report.json
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Deploy dist to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
      - name: Attach v1 main.zip to a release
        if: hashFiles('dist/store/main.zip') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: store-${{ github.run_number }}
          files: dist/store/main.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
